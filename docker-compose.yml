name: api-gateway-tradeoff

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rate_limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limiter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./gateway
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/rate_limiter
      REDIS_URL: redis://redis:6379/0
      GATEWAY_PORT: 8000
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      GATEWAY_USER_SERVICE_URL: http://user-service:8001
      GATEWAY_PRODUCT_SERVICE_URL: http://product-service:8002
      GATEWAY_ORDER_SERVICE_URL: http://order-service:8003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-qO-", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  pgdata:
  redisdata:
